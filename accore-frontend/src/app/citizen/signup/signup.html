<div class="flex flex-col items-center justify-center min-h-screen bg-gray-50 p-4">
  <div class="w-full max-w-md p-8 bg-white rounded-lg shadow-sm border border-gray-200">
    <div class="text-center space-y-2 mb-8">
      <h2 class="text-3xl font-bold tracking-tight">Create an Account</h2>
      <p class="text-gray-500">Join AC-CORE to report incidents and stay updated.</p>
    </div>

    <div class="flex justify-center w-full mb-6">
      <asl-google-signin-button type="standard" size="large" [width]="300"></asl-google-signin-button>
    </div>

    <div class="relative flex items-center py-4 mb-2">
      <div class="flex-grow border-t border-gray-200"></div>
      <span class="flex-shrink-0 mx-4 text-sm text-gray-400">or register with email</span>
      <div class="flex-grow border-t border-gray-200"></div>
    </div>

    <div *ngIf="errorMessage()" class="p-3 mb-4 text-sm text-red-600 bg-red-50 rounded-md">
      {{ errorMessage() }}
    </div>

    <form [formGroup]="signupForm" (ngSubmit)="onSubmit()" class="space-y-4">
      <div class="grid grid-cols-2 gap-4">
        <div class="space-y-1">
          <label hlmLabel for="firstName">First Name</label>
          <input hlmInput id="firstName" type="text" formControlName="firstName" placeholder="Juan" class="w-full" />
          <div *ngIf="signupForm.get('firstName')?.touched && signupForm.get('firstName')?.invalid" class="text-xs text-red-500 mt-1">
            Required.
          </div>
        </div>
        
        <div class="space-y-1">
          <label hlmLabel for="lastName">Last Name</label>
          <input hlmInput id="lastName" type="text" formControlName="lastName" placeholder="Dela Cruz" class="w-full" />
          <div *ngIf="signupForm.get('lastName')?.touched && signupForm.get('lastName')?.invalid" class="text-xs text-red-500 mt-1">
            Required.
          </div>
        </div>
      </div>

      <div class="space-y-1">
        <label hlmLabel for="email">Email Address</label>
        <input hlmInput id="email" type="email" formControlName="email" placeholder="juan@example.com" class="w-full" />
        <div *ngIf="signupForm.get('email')?.touched && signupForm.get('email')?.invalid" class="text-xs text-red-500 mt-1">
          Please enter a valid email.
        </div>
      </div>

      <div class="space-y-1">
        <label hlmLabel for="password">Password</label>
        <input hlmInput id="password" type="password" formControlName="password" placeholder="Create a password (min 6 chars)" class="w-full" />
        <div *ngIf="signupForm.get('password')?.touched && signupForm.get('password')?.invalid" class="text-xs text-red-500 mt-1">
          Password must be at least 6 characters.
        </div>
      </div>

      <button hlmBtn type="submit" class="w-full mt-6" [disabled]="isLoading() || signupForm.invalid">
        <span *ngIf="isLoading()">Creating account...</span>
        <span *ngIf="!isLoading()">Sign Up</span>
      </button>
    </form>

    <p class="text-center text-sm text-gray-500 mt-8">
      Already have an account? <a href="/citizen/login" class="text-blue-600 hover:underline">Log in here</a>.
    </p>
  </div>
</div>
