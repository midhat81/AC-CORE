<div class="min-h-screen bg-gray-50">
  
  <nav class="flex items-center justify-between p-4 bg-white border-b border-gray-200 shadow-sm">
    <div class="flex items-center gap-2">
      <img src="assets/favicon.ico" alt="AC-CORE Logo" class="w-8 h-8 object-contain">
      <span class="text-lg font-bold text-red-800">AC-CORE Citizen</span>
    </div>
    <button hlmBtn variant="ghost" size="sm" (click)="onLogout()">
      Logout
    </button>
  </nav>

  <main class="max-w-4xl mx-auto p-4 md:p-6 space-y-8">
    
    <section class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm flex flex-col items-center text-center space-y-4">
      <h1 class="text-2xl font-bold text-gray-900">Welcome Back!</h1>
      <p class="text-gray-600">Help keep our barangays safe. Spot a micro-infrastructure hazard?</p>
      
      <a routerLink="/report" hlmBtn class="bg-red-700 hover:bg-red-800 text-white w-full md:w-auto px-8">
        Report a New Hazard
      </a>
    </section>

    <section class="space-y-4">
      <h2 class="text-xl font-semibold text-gray-800">My Recent Reports</h2>
      
      <div class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
        <div *ngFor="let report of myReports" class="p-4 border-b border-gray-100 flex justify-between items-center hover:bg-gray-50 transition-colors">
          <div>
            <h3 class="font-medium text-gray-900">{{ report.title }}</h3>
            <p class="text-sm text-gray-500">{{ report.location }} • {{ report.date }}</p>
          </div>
          <span 
            class="px-3 py-1 text-xs font-semibold rounded-full"
            [ngClass]="{
              'bg-yellow-100 text-yellow-800': report.status === 'Pending',
              'bg-green-100 text-green-800': report.status === 'Resolved'
            }">
            {{ report.status }}
          </span>
        </div>
        
        <div *ngIf="myReports.length === 0" class="p-8 text-center text-gray-500">
          You haven't submitted any reports yet.
        </div>
      </div>
    </section>

  </main>
</div>
