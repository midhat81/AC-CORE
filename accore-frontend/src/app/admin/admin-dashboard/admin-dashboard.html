    <header class="flex justify-between items-center p-6 border-b border-gray-200 bg-red-800 text-white">

        <div>
          <h1 class="text-xl md:text-2xl font-bold">LGU Command Center</h1>
          <p class="text-sm text-red-200 hidden md:block">Angeles City Municipal Maintenance</p>
        </div>
